name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site
          cp life/index.html life/.nojekyll _site/ 2>/dev/null || cp life/index.html _site/
          cp life/package.json life/package-lock.json life/server.js life/scrollytelling-standalone.js life/prototype.html _site/ 2>/dev/null || true
          cp life/*.otf _site/ 2>/dev/null || true
          cp -r life/sequence life/sequence\ 2 _site/ 2>/dev/null || true
          shopt -s nullglob
          for f in life/*.png life/*.jpg life/*.jpeg life/*.webp life/*.avif life/*.PNG life/*.JPG life/*.JPEG; do
            cp "$f" _site/
          done

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
